name: Push Docker image to ghcr.io

on:
  workflow_dispatch:   # 允许手动触发
  schedule:
    - cron: '0 1 */7 * *'    # 每7天触发一次
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ghcr.io/guhill1/docker-smartdns:latest

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_TAG }}

            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          load: true
          tags: ${{ env.IMAGE_TAG }}

      - name: Save Docker image locally
        run: docker save --output docker-smartdns.tar "${{ env.IMAGE_TAG }}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-smartdns
          path: docker-smartdns.tar
          retention-days: 3

      - name: Release with Notes
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: docker-smartdns.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
